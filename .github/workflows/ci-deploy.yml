name: Test, Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Test and build Angular application
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --watch=false

      - name: Build production application
        run: npm run build -- --base-href "/${{ github.event.repository.name }}/"

      - name: Prepare GitHub Pages artifact
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          INDEX_FILE="$(find dist -type f -name index.html -print -quit)"

          if [ -z "$INDEX_FILE" ]; then
            echo "No production index.html file was found."
            exit 1
          fi

          BUILD_DIRECTORY="$(dirname "$INDEX_FILE")"

          echo "Using Angular output directory: $BUILD_DIRECTORY"

          mkdir -p _site
          cp -R "$BUILD_DIRECTORY"/. _site/
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy application
        id: deployment
        uses: actions/deploy-pages@v4
